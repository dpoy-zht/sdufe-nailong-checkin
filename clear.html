<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>清除缓存中...</title>
<style>
body {
  margin: 0; padding: 40px; font-family: sans-serif;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; background: #FFF9E8; color: #5A4A3A;
}
.spinner { width: 48px; height: 48px; border: 4px solid #FFE4A0;
  border-top-color: #A0D8EF; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
p { margin-top: 20px; font-size: 18px; }
</style>
</head>
<body>
<div class="spinner"></div>
<p>正在清除缓存，请稍候...</p>
<script>
// 清除所有 Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    return Promise.all(regs.map(r => r.unregister()));
  }).then(() => {
    // 清除所有 Cache Storage
    return caches.keys().then(names => {
      return Promise.all(names.map(n => caches.delete(n)));
    });
  }).finally(() => {
    // 跳转到主页
    setTimeout(() => { window.location.href = './'; }, 500);
  });
} else {
  // 没有 SW，直接跳
  window.location.href = './';
}
</script>
</body>
</html>
